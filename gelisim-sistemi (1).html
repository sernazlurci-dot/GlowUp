<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gelişim">
<title>Kişisel Gelişim Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#f9fafb;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:16px 16px 90px}
.header{text-align:center;padding:20px 0 8px}
.header h1{font-size:20px;font-weight:700;color:#f9fafb;letter-spacing:-.3px}
.header p{font-size:11px;color:#6b7280;margin-top:3px}
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:#6b7280;margin-bottom:14px;cursor:pointer}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
.sync-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{display:flex;gap:4px;background:#111827;padding:6px;border-radius:16px;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:488px;z-index:100;border:1px solid #1f2937}
.nav button{flex:1;padding:7px 4px;border:none;background:transparent;cursor:pointer;border-radius:10px;font-size:10px;font-weight:600;color:#6b7280;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button.active{background:#1f2937;color:#f9fafb}
.nav-icon{font-size:15px}
.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#f9fafb;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#1f2937;border-radius:12px;padding:12px;text-align:center}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:3px}
.metric-val{font-size:22px;font-weight:700;color:#f9fafb}
.xp-bar-wrap{background:#1f2937;border-radius:99px;height:8px;overflow:hidden;margin:8px 0}
.xp-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:99px;transition:width .5s ease}
.rank-badge{display:inline-flex;align-items:center;gap:5px;background:#1f2937;border:1px solid #374151;border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:#f9fafb}
.month-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:5px 10px;border-radius:99px;border:1px solid #1f2937;background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:#6b7280;font-family:inherit;transition:all .15s}
.month-tab.active{background:#6366f1;color:#fff;border-color:#6366f1}
.habit-row{margin-bottom:14px}
.habit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.habit-name{font-size:13px;font-weight:600;color:#f9fafb}
.habit-pct{font-size:12px;color:#6b7280}
.day-grid{display:grid;gap:3px}
.day-cell{aspect-ratio:1;border-radius:5px;border:1px solid #1f2937;background:#1f2937;cursor:pointer;font-size:8px;font-weight:600;color:#4b5563;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none}
.day-cell.done{background:#10b981;border-color:#10b981;color:#fff}
.day-cell.today{border-color:#6366f1;border-width:2px}
.day-cell:active{transform:scale(0.9)}
.streak-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#1f2937;color:#f59e0b;border-radius:99px;padding:2px 7px;margin-left:6px}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;background:#1f2937;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#f9fafb;font-size:13px;font-family:inherit;outline:none}
.add-row input:focus{border-color:#6366f1}
.add-row input::placeholder{color:#4b5563}
.btn{background:#6366f1;border:none;border-radius:10px;padding:8px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#5254cc}
.btn:active{transform:scale(.97)}
.btn.secondary{background:#1f2937;color:#9ca3af}
.btn.secondary:hover{background:#374151}
.btn.full{width:100%;padding:11px;font-size:13px;margin-top:8px}
.btn.green{background:#10b981}
.btn.green:hover{background:#059669}
.habit-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.habit-tag{font-size:11px;background:#1f2937;border:1px solid #374151;border-radius:99px;padding:3px 9px;cursor:pointer;color:#9ca3af;transition:all .15s}
.habit-tag:hover{border-color:#ef4444;color:#ef4444}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1f2937}
.goal-item:last-child{border-bottom:none}
.goal-check{width:20px;height:20px;flex-shrink:0;border-radius:6px;border:1px solid #374151;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;font-family:inherit;color:#fff;transition:all .15s}
.goal-check.done{background:#10b981;border-color:#10b981}
.goal-title{font-size:13px;font-weight:600;color:#f9fafb;line-height:1.4}
.goal-title.done{text-decoration:line-through;color:#4b5563}
.goal-meta{font-size:11px;color:#6b7280;margin-top:2px}
.goal-add{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #1f2937}
.goal-add input{background:#1f2937;border:1px solid #374151;border-radius:10px;padding:8px 12px;color:#f9fafb;font-size:13px;font-family:inherit;outline:none}
.goal-add input:focus{border-color:#6366f1}
.goal-add input::placeholder{color:#4b5563}
.quote-card{border-left:3px solid #6366f1;padding:12px 14px;background:#1a1a2e;border-radius:0 10px 10px 0;margin-bottom:8px}
.quote-text{font-size:13px;color:#f9fafb;line-height:1.6;font-style:italic;margin-bottom:4px}
.quote-author{font-size:11px;color:#6b7280}
.vision-area{width:100%;min-height:90px;background:#1f2937;border:1px solid #374151;border-radius:10px;padding:10px;color:#f9fafb;font-size:13px;font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.vision-area:focus{border-color:#6366f1}
.ai-result{background:#1a1a2e;border:1px solid #374151;border-radius:12px;padding:14px;margin-top:10px;font-size:13px;color:#d1d5db;line-height:1.7;white-space:pre-wrap}
.loading{display:flex;align-items:center;gap:8px;padding:14px;color:#6b7280;font-size:13px}
.dot{width:6px;height:6px;border-radius:50%;background:#6366f1;animation:dot .8s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.month-chart{display:flex;gap:3px;align-items:flex-end;height:56px;margin-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;background:#6366f1;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s}
.bar-label{font-size:8px;color:#374151}
.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4b5563;margin-bottom:8px}
.rank-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1f2937;font-size:13px}
.rank-row:last-child{border-bottom:none}
.rank-row.current{color:#6366f1;font-weight:700}
.delete-btn{background:none;border:none;cursor:pointer;font-size:16px;color:#374151;padding:0;line-height:1;transition:color .15s}
.delete-btn:hover{color:#ef4444}
.empty-state{text-align:center;color:#374151;padding:24px;font-size:13px}
.save-flash{color:#10b981!important}
textarea::placeholder{color:#4b5563}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ Kişisel Gelişim</h1>
    <p>2026 Takip Sistemi</p>
  </div>
  <div class="sync-bar" onclick="syncNow()" title="Senkronize et">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">Yükleniyor...</span>
  </div>

  <div id="tab-goat"></div>
  <div id="tab-chain" style="display:none"></div>
  <div id="tab-goals" style="display:none"></div>
  <div id="tab-seneca" style="display:none"></div>
  <div id="tab-ai" style="display:none"></div>

  <nav class="nav">
    <button class="active" onclick="showTab('goat')"><span class="nav-icon">⭐</span>GOAT</button>
    <button onclick="showTab('chain')"><span class="nav-icon">🔗</span>Zincir</button>
    <button onclick="showTab('goals')"><span class="nav-icon">🎯</span>Hedefler</button>
    <button onclick="showTab('seneca')"><span class="nav-icon">🧠</span>Seneca</button>
    <button onclick="showTab('ai')"><span class="nav-icon">✨</span>AI Koç</button>
  </nav>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwWPWnzyQ-_p6k4ndNAo0sJ8VhOhqSTngBFJd6CwY9kQ3vAD_6lbMJS2Dy3ZhtUHmYa/exec";

const MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const DAYS=[31,28,31,30,31,30,31,31,30,31,30,31];
const RANKS=["🌱 Aday","⚔️ Çırak","🔥 Disiplin","💪 Azim","🚀 Momentum","🎯 Odak","🏆 Ustalık","👑 Liderlik","🦅 Efsane","🐐 GOAT"];
const RANK_XP=[0,100,250,500,1000,2000,3500,5000,7500,10000];
const QUOTES=[
  {q:"Kaybettiğin zamanı telafi etme. Şu anı en iyi şekilde kullan.",a:"Seneca"},
  {q:"Engel, ilerlemenin ta kendisidir.",a:"Marcus Aurelius"},
  {q:"Disiplin özgürlüktür. Kendine hakim olan her şeye hakimdir.",a:"Seneca"},
  {q:"Bugün iyi yaşayan, yarından korkmaz.",a:"Seneca"},
  {q:"Zihnini eğit. Beden onu takip eder.",a:"Epiktetos"},
  {q:"Her gün biraz daha iyi olmak yeter. Yıl sonunda kim olduğuna bak.",a:"Seneca"},
  {q:"Şikâyet enerji tüketir. Aksiyon enerji üretir.",a:"Marcus Aurelius"},
  {q:"Zor olanı seç. Kolay yol seni küçültür.",a:"Seneca"},
  {q:"Küçük adımlar, büyük mesafeleri geçer.",a:"Marcus Aurelius"},
  {q:"Dışarıya değil, içeriye bak. Büyüme orada gizli.",a:"Epiktetos"},
  {q:"Kendini bil. Geri kalan her şey gelir.",a:"Epiktetos"},
  {q:"Sistemin varsa motivasyona ihtiyacın olmaz.",a:"Marcus Aurelius"},
];

const NOW=new Date();
const CUR_MONTH=NOW.getMonth();
const CUR_DAY=NOW.getDate();

let habits=["Egzersiz","Kitap","Meditasyon","Su (2L)","Erken Uyanış"];
let checks={};
let goals=[];
let visions={};
let curMonth=CUR_MONTH;
let syncTimer=null;
let lastSaved=null;

// ── SYNC ──────────────────────────────────────────────────────────────────
function setSyncStatus(status, text){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  txt.textContent=text;
}

async function loadFromSheet(){
  setSyncStatus('syncing','Veriler yükleniyor...');
  try{
    const r=await fetch(GAS_URL+'?action=load&t='+Date.now());
    const text=await r.text();
    const data=JSON.parse(text);
    if(data&&Object.keys(data).length){
      if(data.habits)habits=data.habits;
      if(data.checks)checks=data.checks;
      if(data.goals)goals=data.goals;
      if(data.visions)visions=data.visions;
    }
    lastSaved=new Date();
    setSyncStatus('ok','Son kayıt: '+lastSaved.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e){
    setSyncStatus('error','Bağlantı hatası — yerel mod');
    // Fallback to localStorage
    try{
      const local=localStorage.getItem('sg_data');
      if(local){const d=JSON.parse(local);if(d.habits)habits=d.habits;if(d.checks)checks=d.checks;if(d.goals)goals=d.goals;if(d.visions)visions=d.visions;}
    }catch{}
  }
  renderCurrent();
}

async function saveToSheet(){
  const payload={habits,checks,goals,visions};
  // Always save to localStorage as backup
  try{localStorage.setItem('sg_data',JSON.stringify(payload))}catch{}
  setSyncStatus('syncing','Kaydediliyor...');
  try{
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'}});
    lastSaved=new Date();
    setSyncStatus('ok','Kaydedildi ✓ '+lastSaved.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e){
    setSyncStatus('error','Yerel kaydedildi (internet yok)');
  }
}

function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(saveToSheet, 1500);
}

function syncNow(){loadFromSheet()}

// ── STATE HELPERS ─────────────────────────────────────────────────────────
function totalXP(){return Object.values(checks).filter(v=>v).length*10}
function getRankIdx(xp){let r=0;for(let i=0;i<RANK_XP.length;i++){if(xp>=RANK_XP[i])r=i}return r}
function monthPct(m){
  const total=DAYS[m]*habits.length;
  if(!total)return 0;
  let done=0;
  habits.forEach(h=>{for(let d=1;d<=DAYS[m];d++){if(checks[`${m}-${d}-${h}`])done++}});
  return Math.round(done/total*100);
}
function getStreak(h,m,upTo){
  let s=0;
  for(let d=upTo;d>=1;d--){if(checks[`${m}-${d}-${h}`])s++;else break}
  return s;
}

// ── TABS ──────────────────────────────────────────────────────────────────
let currentTab='goat';
function showTab(t){
  currentTab=t;
  ['goat','chain','goals','seneca','ai'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.nav button').forEach((b,i)=>{
    b.classList.toggle('active',['goat','chain','goals','seneca','ai'][i]===t);
  });
  if(t==='goat')renderGoat();
  if(t==='chain')renderChain();
  if(t==='goals')renderGoals();
  if(t==='seneca')renderSeneca();
  if(t==='ai')renderAI();
}
function renderCurrent(){showTab(currentTab)}

// ── GOAT PANEL ────────────────────────────────────────────────────────────
function renderGoat(){
  const xp=totalXP();
  const ri=getRankIdx(xp);
  const nextXP=RANK_XP[Math.min(ri+1,9)];
  const prevXP=RANK_XP[ri];
  const pct=nextXP===prevXP?100:Math.round((xp-prevXP)/(nextXP-prevXP)*100);
  const activeDays=new Set(Object.keys(checks).filter(k=>checks[k]).map(k=>k.split('-').slice(0,2).join('-'))).size;
  const monthly=Array.from({length:12},(_,i)=>monthPct(i));
  const bestIdx=monthly.indexOf(Math.max(...monthly));
  const bars=MONTHS.map((m,mi)=>{
    const h=Math.max(Math.round(monthly[mi]*0.56),2);
    return `<div class="bar-col"><div class="bar-fill" style="height:${h}px;opacity:${monthly[mi]>0?1:.15}"></div><span class="bar-label">${m[0]}</span></div>`;
  }).join('');

  document.getElementById('tab-goat').innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div class="section-label">Mevcut rütbe</div>
        <div style="font-size:22px;font-weight:700">${RANKS[ri]}</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">${xp.toLocaleString('tr-TR')} XP</div>
      </div>
      <div class="rank-badge">${ri<9?'→ '+RANKS[ri+1]:'Zirve! 🎉'}</div>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#374151;margin-top:2px"><span>${prevXP.toLocaleString('tr-TR')}</span><span>${pct}%</span><span>${nextXP.toLocaleString('tr-TR')}</span></div>
  </div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Aktif gün</div><div class="metric-val">${activeDays}</div></div>
    <div class="metric"><div class="metric-label">Bu ay</div><div class="metric-val">${monthPct(CUR_MONTH)}%</div></div>
    <div class="metric"><div class="metric-label">En iyi ay</div><div class="metric-val">${MONTHS[bestIdx].slice(0,3)}</div></div>
    <div class="metric"><div class="metric-label">Alışkanlık</div><div class="metric-val">${habits.length}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Aylık performans</div>
    <div class="month-chart">${bars}</div>
  </div>
  <div class="card">
    <div class="card-title">Rütbe yolu</div>
    ${RANKS.map((r,i)=>`<div class="rank-row ${i===ri?'current':''}"><span>${r}</span><span style="font-size:11px;color:#4b5563">${RANK_XP[i].toLocaleString('tr-TR')} XP</span></div>`).join('')}
  </div>`;
}

// ── CHAIN TRACKER ─────────────────────────────────────────────────────────
function renderChain(){
  const days=DAYS[curMonth];
  const tabs=MONTHS.map((m,i)=>`<button class="month-tab ${i===curMonth?'active':''}" onclick="curMonth=${i};renderChain()">${m.slice(0,3)}</button>`).join('');
  const rows=habits.map(h=>{
    const done=Array.from({length:days},(_,i)=>checks[`${curMonth}-${i+1}-${h}`]?1:0).reduce((a,b)=>a+b,0);
    const pct=Math.round(done/days*100);
    const streak=getStreak(h,curMonth,curMonth===CUR_MONTH?CUR_DAY:days);
    const cells=Array.from({length:days},(_,i)=>{
      const d=i+1,k=`${curMonth}-${d}-${h}`;
      const isDone=!!checks[k],isToday=curMonth===CUR_MONTH&&d===CUR_DAY;
      return `<div class="day-cell ${isDone?'done':''} ${isToday?'today':''}" onclick="toggleCheck('${k}')">${d}</div>`;
    }).join('');
    return `<div class="habit-row">
      <div class="habit-header">
        <div><span class="habit-name">${h}</span>${streak>=3?`<span class="streak-pill">🔥 ${streak}</span>`:''}</div>
        <span class="habit-pct">${pct}%</span>
      </div>
      <div class="day-grid" style="grid-template-columns:repeat(${Math.min(days,7)},minmax(0,1fr))">${cells}</div>
    </div>`;
  }).join('');

  document.getElementById('tab-chain').innerHTML=`
  <div class="month-tabs">${tabs}</div>
  <div class="card">
    <div class="card-title">${MONTHS[curMonth]} — Alışkanlık zinciri</div>
    ${rows||'<div class="empty-state">Alışkanlık eklemek için aşağıya yaz 👇</div>'}
    <div class="add-row" style="margin-top:12px">
      <input id="new-habit" placeholder="Yeni alışkanlık..." maxlength="30" onkeydown="if(event.key==='Enter')addHabit()">
      <button class="btn" onclick="addHabit()">Ekle</button>
    </div>
    ${habits.length?`<div class="habit-tags">${habits.map((h,i)=>`<span class="habit-tag" onclick="removeHabit(${i})" title="Sil">✕ ${h}</span>`).join('')}</div>`:''}
  </div>`;
}

function toggleCheck(k){
  checks[k]=!checks[k];
  renderChain();
  scheduleSave();
}
function addHabit(){
  const v=document.getElementById('new-habit').value.trim();
  if(!v||habits.length>=8)return;
  habits.push(v);
  document.getElementById('new-habit').value='';
  renderChain();
  scheduleSave();
}
function removeHabit(i){
  if(!confirm(`"${habits[i]}" silinsin mi?`))return;
  habits.splice(i,1);
  renderChain();
  scheduleSave();
}

// ── GOALS ─────────────────────────────────────────────────────────────────
function renderGoals(){
  const done=goals.filter(g=>g.done).length;
  const pct=goals.length?Math.round(done/goals.length*100):0;
  const list=goals.map((g,i)=>`
  <div class="goal-item">
    <button class="goal-check ${g.done?'done':''}" onclick="toggleGoal(${i})">${g.done?'✓':''}</button>
    <div style="flex:1;min-width:0">
      <div class="goal-title ${g.done?'done':''}">${g.title}</div>
      ${g.deadline?`<div class="goal-meta">📅 ${g.deadline}</div>`:''}
      ${g.note?`<div class="goal-meta">${g.note}</div>`:''}
    </div>
    <button class="delete-btn" onclick="removeGoal(${i})">×</button>
  </div>`).join('');

  document.getElementById('tab-goals').innerHTML=`
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Toplam hedef</div><div class="metric-val">${goals.length}</div></div>
    <div class="metric"><div class="metric-label">Tamamlanan</div><div class="metric-val">${done}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="card-title" style="margin:0">2026 Hedeflerim</div>
      <span style="font-size:13px;font-weight:700;color:#6366f1">${pct}%</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%;background:linear-gradient(90deg,#10b981,#059669)"></div></div>
    <div style="margin-top:10px">${list||'<div class="empty-state">Henüz hedef yok<br>Aşağıdan ekle 👇</div>'}</div>
    <div class="goal-add">
      <input id="g-title" placeholder="Hedef başlığı *">
      <input id="g-date" placeholder="Son tarih (örn. Haziran 2026)">
      <input id="g-note" placeholder="Neden önemli? (opsiyonel)">
      <button class="btn full" onclick="addGoal()">+ Hedef Ekle</button>
    </div>
  </div>`;
}

function toggleGoal(i){goals[i].done=!goals[i].done;renderGoals();scheduleSave()}
function removeGoal(i){if(!confirm('Hedef silinsin mi?'))return;goals.splice(i,1);renderGoals();scheduleSave()}
function addGoal(){
  const t=document.getElementById('g-title').value.trim();
  if(!t)return;
  goals.push({title:t,deadline:document.getElementById('g-date').value.trim(),note:document.getElementById('g-note').value.trim(),done:false,created:new Date().toISOString()});
  renderGoals();scheduleSave();
}

// ── SENECA ────────────────────────────────────────────────────────────────
function renderSeneca(){
  const qi=(NOW.getMonth()*30+NOW.getDate())%QUOTES.length;
  const vision=visions[CUR_MONTH]||'';
  const allQ=QUOTES.map(q=>`<div class="quote-card"><div class="quote-text">"${q.q}"</div><div class="quote-author">— ${q.a}</div></div>`).join('');
  document.getElementById('tab-seneca').innerHTML=`
  <div class="card">
    <div class="section-label">Günün Stoiği</div>
    <div class="quote-card" style="margin:0"><div class="quote-text" style="font-size:14px">"${QUOTES[qi].q}"</div><div class="quote-author">— ${QUOTES[qi].a}</div></div>
  </div>
  <div class="card">
    <div class="card-title">${MONTHS[CUR_MONTH]} — Vizyon Panosu</div>
    <textarea class="vision-area" id="vision-input" placeholder="Bu ay için hedefin, motivasyonun, kendine verdiğin söz...">${vision}</textarea>
    <button class="btn full" id="vis-btn" onclick="saveVision()">Kaydet</button>
  </div>
  <div class="card">
    <div class="card-title">Stoa Kütüphanesi</div>
    ${allQ}
  </div>`;
}

function saveVision(){
  visions[CUR_MONTH]=document.getElementById('vision-input').value;
  const btn=document.getElementById('vis-btn');
  btn.textContent='Kaydedildi ✓';btn.className='btn full green';
  setTimeout(()=>{btn.textContent='Kaydet';btn.className='btn full'},2000);
  scheduleSave();
}

// ── AI KOÇ ────────────────────────────────────────────────────────────────
function renderAI(){
  document.getElementById('tab-ai').innerHTML=`
  <div class="card">
    <div class="card-title">✨ Haftalık Analiz</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:10px;line-height:1.6">Bu haftanın verilerini analiz edeyim. Güçlü yanların, gelişim alanların ve sana özel bir öneri hazırlayayım.</p>
    <button class="btn full" onclick="runAnalysis(this)">Haftamı analiz et ↗</button>
    <div id="ai-out1"></div>
  </div>
  <div class="card">
    <div class="card-title">💬 Koçuma Sor</div>
    <textarea id="ai-q" class="vision-area" style="min-height:70px" placeholder="Örn: Bu hafta neden zorlandım? Hangi alışkanlığa öncelik vermeliyim?"></textarea>
    <button class="btn full" style="margin-top:8px" onclick="runQuestion(this)">Sor ↗</button>
    <div id="ai-out2"></div>
  </div>`;
}

async function callClaude(prompt, outputId, btn){
  const out=document.getElementById(outputId);
  if(btn){btn.disabled=true}
  out.innerHTML='<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Düşünüyorum...</span></div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    const text=d.content?.map(c=>c.text||'').join('')||'Yanıt alınamadı.';
    out.innerHTML=`<div class="ai-result">${text}</div>`;
  }catch(e){
    out.innerHTML=`<div class="ai-result" style="color:#ef4444">Bağlantı hatası. Tekrar dene.</div>`;
  }
  if(btn){btn.disabled=false}
}

function runAnalysis(btn){
  const xp=totalXP();
  const ri=getRankIdx(xp);
  const weekData={};
  habits.forEach(h=>{
    let cnt=0;
    for(let d=Math.max(1,CUR_DAY-6);d<=CUR_DAY;d++){if(checks[`${CUR_MONTH}-${d}-${h}`])cnt++}
    weekData[h]=cnt;
  });
  const summary=habits.map(h=>`${h}: ${weekData[h]}/7 gün`).join(', ');
  const prompt=`Sen bir kişisel gelişim koçusun. Kullanıcının alışkanlık verilerini analiz et.

Veriler:
- Rütbe: ${RANKS[ri]} (${xp} XP)
- ${MONTHS[CUR_MONTH]} başarı: %${monthPct(CUR_MONTH)}
- Bu hafta (son 7 gün): ${summary||'Veri yok'}
- Toplam alışkanlık: ${habits.length}

Türkçe, samimi ve motive edici bir analiz yap. Şunları içersin:
1. Bu haftanın kısa özeti
2. En güçlü alışkanlık ve tebrik
3. Dikkat gerektiren alışkanlık ve pratik öneri
4. Haftaya özel motivasyon mesajı

Maks 150 kelime, samimi ve kişisel konuş.`;
  callClaude(prompt,'ai-out1',btn);
}

function runQuestion(btn){
  const q=document.getElementById('ai-q').value.trim();
  if(!q)return;
  const xp=totalXP();
  const context=`Kullanıcı: ${RANKS[getRankIdx(xp)]} rütbesi, ${xp} XP, ${habits.length} alışkanlık (${habits.join(', ')}), ${MONTHS[CUR_MONTH]} başarı: %${monthPct(CUR_MONTH)}.`;
  const prompt=`Sen bir kişisel gelişim koçusun. ${context}\n\nKullanıcı sorusu: ${q}\n\nTürkçe, samimi ve pratik cevap ver. Maks 150 kelime.`;
  callClaude(prompt,'ai-out2',btn);
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadFromSheet();
</script>
